<body>

            var bx = document.getElementById("box");

            function change1()

                var a=document.getElementById("box");
                a.style.backgroundColor="red";
            }
            function change2()
            {

                a.style.backgroundColor="blue";

            function change3()

            }

                var a=document.getElementById("box");

            }
